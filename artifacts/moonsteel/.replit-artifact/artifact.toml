kind = "web"
previewPath = "/"
title = "Moon Steel Fabricators"
version = "1.0.0"
id = "artifacts/moonsteel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23909

[services.development]
run = "pnpm --filter @workspace/moonsteel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moonsteel", "run", "build" ]
publicDir = "artifacts/moonsteel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23909"
BASE_PATH = "/"
